name: Sync from Upstream

on:
  schedule:
    - cron: '0 */6 * * *'  # Every 6 hours
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: master
          
      - name: Configure Git
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"

      - name: Add upstream remote
        run: |
          git remote add upstream https://github.com/jo-inc/camofox-browser.git
          
      - name: Fetch upstream tags
        run: |
          git fetch upstream --tags
          
      - name: Check if tags need syncing
        run: |
          git push origin --tags || true
          
      - name: Check for new upstream releases
        id: check
        run: |
          upstream_tag=$(git ls-remote --tags upstream | grep -E 'refs/tags/v[0-9]' | cut -d$'\t' -f2 | sed 's|refs/tags/||' | sort -V | tail -1)
          current_tag=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          
          echo "Upstream latest: $upstream_tag"
          echo "Current: $current_tag"
          
          if [ "$upstream_tag" != "$current_tag" ] && [ -n "$upstream_tag" ]; then
            echo "new_release=true" >> $GITHUB_OUTPUT
          else
            echo "new_release=false" >> $GITHUB_OUTPUT
          fi
          
      - name: Sync from upstream
        if: steps.check.outputs.new_release == 'true'
        run: |
          git fetch upstream
          # Merge but don't commit - we'll selectively merge
          git merge upstream/master --no-commit --no-ff || (echo "Merge conflict detected" && exit 1)
          # Remove any upstream workflow files that aren't ours
          for f in .github/workflows/*; do
            fname=$(basename "$f")
            if [ "$fname" != "docker-publish.yml" ] && [ "$fname" != "sync-from-upstream.yml" ]; then
              git rm -f "$f" 2>/dev/null || true
            fi
          done
          git commit -m "Sync from upstream (excluding upstream workflow files)" || echo "Nothing to commit"
          
      - name: Push changes
        if: steps.check.outputs.new_release == 'true'
        run: |
          git push origin master
          
      - name: Push tags
        run: |
          git push origin --tags
