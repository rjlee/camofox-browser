name: Sync from Upstream

on:
  schedule:
    - cron: '0 */6 * * *'  # Every 6 hours
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: master
           
      - name: Configure Git
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"

      - name: Add upstream remote
        run: |
          git remote add upstream https://github.com/jo-inc/camofox-browser.git || true
           
      - name: Fetch upstream
        run: |
          git fetch upstream --tags
           
      - name: Check for new upstream releases
        id: check
        run: |
          # Get latest tag, strip refs/tags/ and ^{} for annotated tags
          upstream_tag=$(git ls-remote --tags upstream | grep -E 'refs/tags/v[0-9]' | grep -v '\^{}$' | cut -d$'\t' -f2 | sed 's|refs/tags/||' | sort -V | tail -1)
          # Get the latest tag on origin (our fork)
          origin_tag=$(git ls-remote --tags origin | grep -E 'refs/tags/v[0-9]' | grep -v '\^{}$' | cut -d$'\t' -f2 | sed 's|refs/tags/||' | sort -V | tail -1)
           
          echo "Upstream latest: $upstream_tag"
          echo "Origin latest: $origin_tag"
           
          if [ "$upstream_tag" != "$origin_tag" ] && [ -n "$upstream_tag" ]; then
            echo "new_release=true" >> $GITHUB_OUTPUT
            echo "upstream_tag=$upstream_tag" >> $GITHUB_OUTPUT
          else
            echo "new_release=false" >> $GITHUB_OUTPUT
          fi
           
      - name: Sync from upstream (without workflow files)
        if: steps.check.outputs.new_release == 'true'
        run: |
          git fetch upstream
          # Merge upstream, preferring their changes
          git merge upstream/master -X theirs --no-commit --no-ff || true
          # Remove upstream-only workflow files
          rm -f .github/workflows/ci.yml 2>/dev/null || true
          rm -f .github/workflows/auto-close-old-reports.yml 2>/dev/null || true
          # Keep our workflow files
          git checkout HEAD -- .github/workflows/docker-publish.yml 2>/dev/null || true
          git checkout HEAD -- .github/workflows/sync-from-upstream.yml 2>/dev/null || true
          # Commit the merge
          git add -A
          git commit -m "Sync from upstream: ${{ steps.check.outputs.upstream_tag }}" || echo "Nothing to commit"
           
      - name: Push changes
        if: steps.check.outputs.new_release == 'true'
        run: |
          git push origin master
           
      - name: Create and push release tag
        if: steps.check.outputs.new_release == 'true'
        run: |
          upstream_tag="${{ steps.check.outputs.upstream_tag }}"
          echo "Creating release tag: $upstream_tag"
          # Delete local tag if exists (from failed attempts)
          git tag -d "$upstream_tag" 2>/dev/null || true
          git tag "$upstream_tag"
          git push origin "$upstream_tag"
